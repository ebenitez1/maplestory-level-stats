name: Scrape rankings

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  list-classes:
    runs-on: ubuntu-latest
    outputs:
      classes: ${{ steps.set.outputs.classes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: set
        run: echo "classes=$(python scraper/scrape.py --list)" >> "$GITHUB_OUTPUT"

  scrape:
    needs: list-classes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      max-parallel: 8
      fail-fast: false
      matrix:
        class: ${{ fromJson(needs.list-classes.outputs.classes) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt
      - run: python scraper/scrape.py --class "${{ matrix.class }}"
      - uses: actions/upload-artifact@v4
        with:
          name: partial-${{ strategy.job-index }}
          path: data/partials/
          retention-days: 1
          if-no-files-found: warn

  combine:
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          path: data/partials/
          pattern: partial-*
          merge-multiple: true
      - run: python scraper/combine.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain data/stats.json) ]]; then
            git add data/stats.json
            git commit -m "Update stats $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to stats.json."
          fi
